server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/shopping_cart
    driver-class-name: org.postgresql.Driver
    username: shopping_cart
    password: shopping_cart
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      warehouse:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
